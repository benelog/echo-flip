{{define "content"}}
<div class="stack-lg" style="padding:2rem 0">
  <div class="center" style="color:var(--primary)">
    {{icon "swap"}}
    <h2 style="margin-top:.75rem;font-size:1.125rem;color:var(--fg)">어느 방향으로 학습할까요?</h2>
  </div>

  <a class="tile row-between" style="padding:1.125rem 1.25rem" href="{{.Data.TextFirst}}">
    <span>
      <span class="row" style="font-weight:600">원문 → 뜻
        {{if eq .Data.Last "text_to_meaning"}}<span class="pill pill-blue">지난번</span>{{end}}
      </span>
      <span class="small muted">영어·용어를 보고 뜻을 떠올려요</span>
    </span>
    <span class="faint">{{icon "arrow"}}</span>
  </a>

  <a class="tile row-between" style="padding:1.125rem 1.25rem" href="{{.Data.TextLast}}">
    <span>
      <span class="row" style="font-weight:600">뜻 → 원문
        {{if eq .Data.Last "meaning_to_text"}}<span class="pill pill-blue">지난번</span>{{end}}
      </span>
      <span class="small muted">뜻·설명을 보고 영어·용어를 떠올려요</span>
    </span>
    <span class="faint">{{icon "arrow"}}</span>
  </a>
</div>
{{end}}
