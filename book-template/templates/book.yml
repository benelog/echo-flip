# 새 책 저장소용 GitHub Pages 배포 워크플로 참고본.
# <책 디렉터리>를 원고 디렉터리로, <엔진 디렉터리>를 book-template 위치로 바꿔 쓴다.
# (엔진을 별도 저장소에서 npm으로 설치한다면 엔진 쪽 npm ci 스텝과 lockfile 항목을 지운다)
name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '<책 디렉터리>/**'
      - '<엔진 디렉터리>/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            <엔진 디렉터리>/package-lock.json
            <책 디렉터리>/package-lock.json
      - name: Install engine dependencies
        run: npm ci
        working-directory: <엔진 디렉터리>
      - name: Install book dependencies
        run: npm ci
        working-directory: <책 디렉터리>
      - name: Build book (adoc → md → VitePress)
        run: npm run build
        working-directory: <책 디렉터리>
      # PDF에 한글이 들어가면 CI 러너에 한글 폰트가 필요하다
      - name: Install Korean fonts for PDF rendering
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Export PDF
        run: npm run pdf
        working-directory: <책 디렉터리>
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: <책 디렉터리>/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
